name: 🟢 Pasture3D Libs (Linux + macOS)

# Builds the Pasture3D GDExtension native libraries for Linux (Steam Deck) and macOS, since these
# can't be built on the Windows dev box. Run it from the Actions tab ("Run workflow"), or it runs
# automatically when the C++ source / extension / godot-cpp pin changes on main. Download the built
# libraries from the run's "Artifacts" section and drop them into project/addons/pasture_3d/bin/.
on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'project/addons/pasture_3d/*.gdextension'
      - 'godot-cpp'
      - '.github/workflows/pasture-libs.yml'

concurrency:
  group: pasture-libs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.name }} ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        identifier: [linux, macos]
        target: [debug, release]
        include:
          - identifier: linux
            platform: linux
            name: 🐧 Linux x86_64
            runner: ubuntu-22.04
            flags: arch=x86_64
          - identifier: macos
            platform: macos
            name: 🍎 macOS universal
            runner: macos-latest
            flags: arch=universal

    steps:
      - name: Checkout (with godot-cpp submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Base Dependencies
        uses: ./.github/actions/base-deps
        with:
          platform: ${{ matrix.platform }}

      - name: Setup Build Cache
        uses: ./.github/actions/build-cache
        with:
          cache-name: ${{ matrix.identifier }}-${{ matrix.target }}
        continue-on-error: true

      - name: Build
        shell: sh
        env:
          SCONS_CACHE: "${{ github.workspace }}/.scons-cache/"
        run: |
          scons target=template_${{ matrix.target }} platform=${{ matrix.platform }} ${{ matrix.flags }} debug_symbols=no -j2

      - name: Strip (Linux)
        if: ${{ matrix.platform == 'linux' }}
        shell: sh
        run: strip project/addons/pasture_3d/bin/libpasture.linux.*

      - name: List output
        shell: sh
        run: ls -lR project/addons/pasture_3d/bin/

      - name: Upload library
        uses: actions/upload-artifact@v4
        with:
          include-hidden-files: true
          name: libpasture-${{ matrix.identifier }}-${{ matrix.target }}
          path: project/addons/pasture_3d/bin/libpasture.${{ matrix.platform }}.*
